name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: install
        run: npm ci
      - name: typecheck:shared
        run: npm run typecheck:shared
      - name: typecheck:server
        run: npm run typecheck:server
      - name: typecheck:client
        run: npm run typecheck:client
      - name: typecheck:asset_gen
        run: npm --workspace @dumrunner/asset_gen run typecheck
