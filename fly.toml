app = 'dumrunner-alpha-holy-pine-7754'
primary_region = 'iad'

[build]
  dockerfile = 'packages/server/Dockerfile'

[env]
  GAME_SERVER_HOST = '0.0.0.0'
  GAME_SERVER_PORT = '8070'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
