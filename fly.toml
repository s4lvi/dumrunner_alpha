# Fly.io app config for the DÛM RUNNER game server.
#
# Lives at the repo root so the Docker build context includes the workspace
# siblings (packages/shared) the server depends on. `flyctl` commands run
# from the repo root.
#
# First-time deploy:
#   flyctl launch --no-deploy --copy-config --name <your-app>
#   flyctl secrets set NEXT_PUBLIC_SUPABASE_URL=... SUPABASE_SERVICE_ROLE_KEY=... JOIN_TOKEN_SECRET=...
#   flyctl deploy
#
# Subsequent deploys: `flyctl deploy` from the repo root.
#
# JOIN_TOKEN_SECRET MUST byte-match the value set in Vercel — clients sign
# join tokens via the Next API route and this server verifies them.

app = "dumrunner-alpha-holy-pine-7754"
primary_region = "iad"

[build]
dockerfile = "packages/server/Dockerfile"

[env]
GAME_SERVER_PORT = "8070"
GAME_SERVER_HOST = "0.0.0.0"

[http_service]
internal_port = 8070
force_https = true
# Keep one machine warm at all times. Fly's auto-stop heuristic is
# request-rate based and was killing machines mid-session even with
# active WebSocket connections (which don't count as "requests" once
# upgraded). The 25s server-side ws ping/pong heartbeat keeps the
# proxy from idling the connection itself; pinning min_machines_running
# to 1 keeps the VM behind the proxy alive too.
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[vm]]
cpu_kind = "shared"
cpus = 1
memory_mb = 256
